server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Hashed bundle output. Vite includes the content hash in every
    # filename under /assets/, so the bundle is content-addressable —
    # safe to cache for a year and tell the browser the URL never
    # changes.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service icons + static images. Not content-hashed, so cache for
    # a month and allow revalidation after that.
    location ~* \.(?:jpg|jpeg|png|webp|svg|ico|txt|xml)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # index.html is the only way a browser discovers the new
    # hashed-asset URLs after a deploy. Pinning it to must-revalidate
    # + no-store stops clients from booting an old SPA that then
    # requests URLs the new server has already garbage-collected.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
