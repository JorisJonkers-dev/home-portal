name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: '${{ steps.rp.outputs.release_created }}'
      tag_name: '${{ steps.rp.outputs.tag_name }}'
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        continue-on-error: true
        with:
          app-id: '${{ secrets.RELEASE_APP_ID }}'
          private-key: '${{ secrets.RELEASE_APP_PRIVATE_KEY }}'

      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: '${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}'
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-image:
    name: Publish Image
    needs:
      - release-please
    if: '${{ needs.release-please.outputs.release_created == ''true'' }}'
    runs-on: ubuntu-latest
    outputs:
      bundle-image: '${{ steps.bundle-image.outputs.ref }}'
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/jorisjonkers-dev/home-portal
    steps:
      - uses: actions/checkout@v6
        with:
          ref: '${{ needs.release-please.outputs.tag_name }}'

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ github.token }}'

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: 'linux/amd64,linux/arm64'
          tags: |
            ${{ env.IMAGE }}:${{ needs.release-please.outputs.tag_name }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          secrets: |
            github_token=${{ github.token }}

      - name: Resolve deploy bundle image
        id: bundle-image
        env:
          IMAGE: '${{ env.IMAGE }}'
          VERSION: '${{ needs.release-please.outputs.tag_name }}'
          DIGEST: '${{ steps.build.outputs.digest }}'
        run: |
          set -euo pipefail
          printf 'ref=%s:%s@%s\n' "$IMAGE" "$VERSION" "$DIGEST" >> "$GITHUB_OUTPUT"

  publish-deploy-bundle:
    name: Publish Deploy Bundle
    needs:
      - release-please
      - publish-image
    if: '${{ needs.release-please.outputs.release_created == ''true'' }}'
    uses: JorisJonkers-dev/github-workflows/.github/workflows/deploy-bundle.yml@v0.8.0
    with:
      images: '${{ needs.publish-image.outputs.bundle-image }}'
      version: '${{ needs.release-please.outputs.tag_name }}'
      bundle-name: home-portal
      package-version: 0.9.0
      publish: true
    secrets: inherit
