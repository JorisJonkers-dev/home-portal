name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: '${{ steps.rp.outputs.release_created }}'
      tag_name: '${{ steps.rp.outputs.tag_name }}'
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        continue-on-error: true
        with:
          app-id: '${{ secrets.RELEASE_APP_ID }}'
          private-key: '${{ secrets.RELEASE_APP_PRIVATE_KEY }}'

      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: '${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}'
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-image:
    name: Publish Image
    needs:
      - release-please
    if: '${{ needs.release-please.outputs.release_created == ''true'' }}'
    runs-on: ubuntu-latest
    outputs:
      bundle-image: '${{ steps.bundle-image.outputs.ref }}'
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/jorisjonkers-dev/home-portal
    steps:
      - uses: actions/checkout@v6
        with:
          ref: '${{ needs.release-please.outputs.tag_name }}'

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ github.token }}'

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: 'linux/amd64,linux/arm64'
          tags: |
            ${{ env.IMAGE }}:${{ needs.release-please.outputs.tag_name }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          secrets: |
            github_token=${{ github.token }}

      - name: Resolve deploy bundle image
        id: bundle-image
        env:
          IMAGE: '${{ env.IMAGE }}'
          VERSION: '${{ needs.release-please.outputs.tag_name }}'
          DIGEST: '${{ steps.build.outputs.digest }}'
        run: |
          set -euo pipefail
          printf 'ref=%s:%s@%s\n' "$IMAGE" "$VERSION" "$DIGEST" >> "$GITHUB_OUTPUT"

  publish-deploy-bundle:
    name: Publish Deploy Bundle
    needs:
      - release-please
      - publish-image
    if: '${{ needs.release-please.outputs.release_created == ''true'' }}'
    runs-on: ubuntu-latest
    outputs:
      bundle-ref: '${{ steps.bundle-ref.outputs.bundle-ref }}'
      bundle-path: '${{ steps.bundle.outputs.bundle-path }}'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: '${{ needs.release-please.outputs.tag_name }}'

      - uses: actions/checkout@v6
        with:
          repository: JorisJonkers-dev/github-workflows
          ref: v0.8.0
          path: .github-workflows
          persist-credentials: false

      - name: Write deploy bundle images
        env:
          IMAGE_REF: '${{ needs.publish-image.outputs.bundle-image }}'
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/deploy-bundle-input"
          printf '{"images":["%s"]}\n' "$IMAGE_REF" > "$RUNNER_TEMP/deploy-bundle-input/images.json"

      - name: Pack deploy bundle
        id: bundle
        uses: ./.github-workflows/actions/deploy-bundle
        with:
          deploy-dir: deploy
          images: '${{ runner.temp }}/deploy-bundle-input/images.json'
          package-version: 0.9.0
          version: '${{ needs.release-please.outputs.tag_name }}'
          bundle-name: home-portal
          node-auth-token: '${{ github.token }}'

      - name: Resolve bundle ref
        id: bundle-ref
        env:
          BUNDLE_NAME: '${{ steps.bundle.outputs.bundle-name }}'
          BUNDLE_VERSION: '${{ steps.bundle.outputs.bundle-version }}'
          GITHUB_REPOSITORY_OWNER: '${{ github.repository_owner }}'
        run: |
          set -euo pipefail

          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          name="$(printf '%s' "$BUNDLE_NAME" | tr '[:upper:]' '[:lower:]')"
          printf 'bundle-ref=ghcr.io/%s/%s-deploy-bundle:%s\n' "$owner" "$name" "$BUNDLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload deploy bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: deploy-bundle
          path: '${{ steps.bundle.outputs.bundle-path }}'
          if-no-files-found: error
          retention-days: 7

      - uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: '${{ github.token }}'
        run: |
          set -euo pipefail

          oras login ghcr.io --username "$GITHUB_ACTOR" --password-stdin <<< "$GHCR_TOKEN"

      - name: Publish deploy bundle
        env:
          BUNDLE_PATH: '${{ steps.bundle.outputs.bundle-path }}'
          BUNDLE_REF: '${{ steps.bundle-ref.outputs.bundle-ref }}'
        run: |
          set -euo pipefail

          oras push "$BUNDLE_REF" "$BUNDLE_PATH:application/vnd.jorisjonkers.deployment.bundle.v1+tar"
