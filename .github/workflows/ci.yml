name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'ci-${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: '${{ github.ref != ''refs/heads/main'' }}'

permissions:
  contents: read
  packages: read

env:
  NODE_VERSION: '24'

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/actionlint
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest /tmp/actionlint

      - name: Run actionlint
        run: '/tmp/actionlint/actionlint .github/workflows/*.yml'

  web-check:
    name: 'Lint, Typecheck, Test, Build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: 'pnpm test:coverage'
      - run: pnpm depcruise
      - run: pnpm build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps
      - run: 'pnpm test:e2e'

  mutation:
    name: Mutation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "$NODE_AUTH_TOKEN"
          pnpm install --frozen-lockfile

      - run: pnpm stryker

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: 'ghcr.io/jorisjonkers-dev/home-portal:ci-${{ github.sha }}'
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

  deploy-bundle:
    name: Deploy Bundle
    permissions:
      contents: read
      packages: write
    uses: JorisJonkers-dev/github-workflows/.github/workflows/deploy-bundle.yml@v0.8.0
    with:
      images: 'ghcr.io/jorisjonkers-dev/home-portal:ci-${{ github.sha }}'
      bundle-name: home-portal
      publish: false
    secrets: inherit

  pipeline-complete:
    name: Pipeline Complete
    if: '${{ always() }}'
    needs:
      - workflow-lint
      - web-check
      - e2e
      - mutation
      - docker-build
      - deploy-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@release/v1
        with:
          jobs: '${{ toJSON(needs) }}'
